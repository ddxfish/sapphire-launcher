[package]
name = "sapphire-launcher"
version = "0.1.0"
edition = "2024"

[dependencies]
iced = { version = "0.13", features = ["image", "tokio"] }
image = "0.24"
tokio = { version = "1", features = ["rt", "process"] }

[build-dependencies]
winres = "0.1"
image = "0.24"

[profile.release]
strip = true
lto = true
opt-level = "z"
